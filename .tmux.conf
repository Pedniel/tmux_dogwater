# ~/.tmux.conf

# Try forcing terminal to those juicy 256 bit colours
set -g default-terminal "screen-256color"
set-as terminal-overrides ",*:Tc"

# ==========================================
# CORE SETTINGS 
# ==========================================

set -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",foot*:Tc"
 
set -g history-limit 2000

# No sounds
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Mouse support, CARE WITH LEGACY
set -g mouse on

# ==========================================
# EVERFOREST JUICE
# ==========================================

# TABS AT TOP
set -g status-position top

# Color shiteNN
set -g status-style "bg=#1e2326,fg=#d3c6aa"

# Active tab
set -g window-status-current-format "#[fg=#1e2326,bg=#a7c080,bold] #I: #W #[default]"

# Inactive Tab
set -g window-status-format "#[fg=#d3c6aa,bg=#2b3339] #I: #W #[default]"

# Session name, could remove this idc
set -g status-left "#[fg=#1e2326,bg=#dbbc7f,bold]  #S #[bg=default] "
set -g status-left-length 50

# Time and date
set -g status-right "#[fg=#1e2326,bg=#7FB4CA,bold] %H:%M #[default]"

set -g pane-active-border-style "fg=#a7c080"
set -g pane-border-style "fg=#2b3339"

set -g message-style "bg=#dbbc7f,fg=#1e2326,bold"

# ==========================================
# CUSTOM EMACS/FIREFOXY STYLE KEYBINDS
# ==========================================

# Main prefix as Ctrl-x
unbind C-b
set -g prefix C-x
bind C-x send-prefix

# Splits
bind 3 split-window -h
bind 2 split-window -v

# Tabs
bind t new-window
# C-x n: next tab
bind n select-pane -t :.+
# C-x p: previous tab
bind p select-pane -t :.-

bind f next-window
bind b previous-window

#  Make it forgiving, hold Ctrl while pressing the second key 
# (e.g., Ctrl-x then Ctrl-n will also work)
bind C-t select-pane -t :.-
bind C-n select-pane -t :.+
bind C-p previous-window
bind C-f next-window
bind C-b new-window
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ==========================================
# SPLIT NAVIGATION
# ==========================================

# M-o jump like richard stallman (god) intended
bind-key -n M-o command-prompt -p "Jump to split:" "select-pane -t '%%'"

set -g display-panes-time 2000
set -g display-panes-active-colour "#a7c080" # Current active split has green border 
set -g display-panes-colour "#dbbc7f"        # Other have whatever color this is border

bind-key -n M-i display-panes

# ==========================================
# FIREFOX STYLE TAB SWITCHING 
# ==========================================

# Start window numbering at 1 
set -g base-index 1
setw -g pane-base-index 1

# Alt+ Num switeches to tab
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# ==========================================
# THE TOGGLE (Bypass Mode for Nano/Emacs)
# ==========================================

# 1. Press Ctrl-g to DISABLE all Tmux keybinds
bind -n C-g \
    set prefix None \;\
    set key-table off \;\
    set status-style "bg=#e67e80,fg=#1e2326" \;\
    if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
    display-message "TMUX OFF (Shortcuts Disabled)" \;\
    refresh-client -S

# 2. Press Ctrl-g AGAIN to RE-ENABLE everything
bind -T off C-g \
    set -u prefix \;\
    set -u key-table \;\
    set -u status-style \;\
    display-message "TMUX ON (Shortcuts Active)" \;\
    refresh-client -S

